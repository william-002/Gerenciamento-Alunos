<mat-label *ngIf="label">{{ label }}</mat-label>

<mat-form-field appearance="outline" class="view-field">
  <mat-icon *ngIf="icon" matPrefix>{{ icon }}</mat-icon>

  <input
    matInput
    [type]="type"
    [placeholder]="placeholder"
    [attr.maxlength]="maxlength || null"
    [formControl]="control"
  >

 
<mat-error *ngIf="control?.invalid && (control?.touched || control?.dirty)">
  {{ errorText }}
</mat-error>

</mat-form-field>
