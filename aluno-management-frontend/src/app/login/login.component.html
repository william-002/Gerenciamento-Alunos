<div class="login-page">
  <mat-card class="login-card mat-elevation-z8">
    <mat-card-content>

      <h1 class="login-title">Start Students</h1>
      <p class="login-subtitle">Faça seu login para continuar</p>

      <!-- Usuário (componentizado) -->
      <app-input-field
        label="Usuário"
        icon="person"
        placeholder="Seu usuário"
        [control]="usuarioControl"
        errorText="Usuário deve ter no mínimo 8 caracteres, com letras e números">
      </app-input-field>

      <!-- Senha (mantida como no início, só que reativa) -->
      <mat-label>Senha</mat-label>
      <mat-form-field appearance="outline" class="login-field">
        <mat-icon matPrefix>lock</mat-icon>

        <input
          matInput
          [type]="mostrarSenha ? 'text' : 'password'"
          [formControl]="senhaControl"
          placeholder="Sua senha"
          maxlength="100">

        <!-- Olho -->
        <button
          mat-icon-button
          matSuffix
          type="button"
          aria-label="Mostrar/ocultar senha"
          (click)="mostrarSenha = !mostrarSenha">
          <mat-icon>{{ mostrarSenha ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>

        <!-- Erro (mostra após tocar/digitar) -->
        <mat-error *ngIf="senhaControl.invalid && (senhaControl.touched || senhaControl.dirty)">
          Senha deve ter no mínimo 8 caracteres, com letras e números
        </mat-error>
      </mat-form-field>

      <!-- Botão -->
      <button
        mat-raised-button
        class="btn-acessar"
        (click)="entrar()"
        [disabled]="form.invalid">
        Acessar
      </button>

    </mat-card-content>
  </mat-card>
</div>
